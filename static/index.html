<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>先锋新闻 - 领先的数据控制台</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/style.css?v=29">
</head>
<body>
    <div class="container">
        <header class="vanguard-header">
            <div class="brand-title">
                <img src="/static/favicon.png" class="brand-logomark" alt="Vanguard Logo" />
                <h1 class="metallic-text" data-text="先锋新闻">先锋新闻</h1>
            </div>
            <div class="header-info">
                <span id="current-time"></span>
                <span class="live-indicator">
                    <span class="live-dot"></span>
                    实时更新
                </span>
            </div>
        </header>

        <div class="author-badge" id="author-badge" aria-label="作者信息">
            <span class="badge-label">作者：</span>
            <span class="badge-text">股票批发王哥</span>
        </div>

        <div class="emoji-fly-container" id="emoji-fly-container"></div>

        <div class="search-bar-container">
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <input type="text" id="search-input" placeholder="🔍 搜索新闻关键词..." maxlength="100" autocomplete="off" />
                    <button id="search-clear" class="search-clear" style="display: none;" aria-label="清除搜索"></button>
                </div>
                <button id="search-btn" class="search-btn">搜索</button>
            </div>
        </div>

        <main>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在加载新闻...</p>
            </div>

            <div id="news-container" class="news-container"></div>
            <div id="error-message" class="error-message" style="display: none;">
                <p>⚠️ 加载失败，请刷新重试</p>
            </div>

            <div class="pagination-bar" id="pagination">
                <div class="pagination-left">
                    <label>每页 <select id="page-size">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                        <option value="30">30</option>
                        <option value="50">50</option>
                    </select> 条</label>
                    <span id="page-info"></span>
                </div>
                <div class="pagination-right">
                    <button id="first-page" class="glass-btn" title="回到第一页">⏮ 首页</button>
                    <button id="prev-page" class="glass-btn" disabled>‹ 上一页</button>
                    <button id="next-page" class="glass-btn">下一页 ›</button>
                </div>
            </div>

            <div class="export-bar">
                <div class="export-dates">
                    <div class="date-range-picker" id="date-range-picker">
                        <button class="drp-trigger" id="drp-trigger" type="button">
                            <svg class="drp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            <span class="drp-label" id="drp-label">选择日期范围</span>
                            <svg class="drp-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="drp-calendar" id="drp-calendar">
                            <div class="drp-cal-hd">
                                <button class="drp-cal-nav" data-dir="-1" type="button" aria-label="上月">‹</button>
                                <span class="drp-cal-title" id="drp-cal-title">2026年5月</span>
                                <button class="drp-cal-nav" data-dir="1" type="button" aria-label="下月">›</button>
                            </div>
                            <div class="drp-cal-weeks">
                                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                            </div>
                            <div class="drp-cal-grid" id="drp-cal-grid"></div>
                            <div class="drp-cal-ft">
                                <span id="drp-cal-hint">请点击选择开始日期</span>
                            </div>
                        </div>
                        <input type="date" id="export-start" class="drp-hidden-input" />
                        <input type="date" id="export-end" class="drp-hidden-input" />
                    </div>
                </div>
                <div class="export-controls">
                    <div class="fmt-dropdown" id="fmt-dropdown" tabindex="0">
                        <button class="fmt-trigger" id="fmt-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                            <span class="fmt-trigger-icon" id="fmt-trigger-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                            </span>
                            <span class="fmt-trigger-label" id="fmt-trigger-label">JSON</span>
                            <svg class="fmt-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="fmt-menu" id="fmt-menu" role="listbox" aria-label="导出格式">
                            <button class="fmt-option active" data-format="json" role="option" aria-selected="true" tabindex="-1">
                                <span class="fmt-opt-icon fmt-c-purple">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                                </span>
                                <span class="fmt-opt-label">JSON</span>
                                <span class="fmt-opt-check">✓</span>
                            </button>
                            <button class="fmt-option" data-format="html" role="option" aria-selected="false" tabindex="-1">
                                <span class="fmt-opt-icon fmt-c-blue">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                                </span>
                                <span class="fmt-opt-label">HTML</span>
                                <span class="fmt-opt-check">✓</span>
                            </button>
                            <button class="fmt-option" data-format="csv" role="option" aria-selected="false" tabindex="-1">
                                <span class="fmt-opt-icon fmt-c-green">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                                </span>
                                <span class="fmt-opt-label">CSV</span>
                                <span class="fmt-opt-check">✓</span>
                            </button>
                            <button class="fmt-option" data-format="md" role="option" aria-selected="false" tabindex="-1">
                                <span class="fmt-opt-icon fmt-c-amber">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                                </span>
                                <span class="fmt-opt-label">Markdown</span>
                                <span class="fmt-opt-check">✓</span>
                            </button>
                            <button class="fmt-option" data-format="jsonl" role="option" aria-selected="false" tabindex="-1">
                                <span class="fmt-opt-icon fmt-c-pink">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>
                                </span>
                                <span class="fmt-opt-label">JSONL</span>
                                <span class="fmt-opt-check">✓</span>
                            </button>
                        </div>
                    </div>
                    <button class="glass-btn export-btn" id="btn-export">
                        <svg class="export-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3v13"/>
                            <polyline points="5 10 12 3 19 10"/>
                            <path d="M5 18v1a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1"/>
                            <circle cx="12" cy="16" r="1" fill="currentColor"/>
                        </svg>
                        <span>导出</span>
                    </button>
                    <span id="export-count" class="export-count"></span>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/app.js?v=29"></script>
</body>
</html>
