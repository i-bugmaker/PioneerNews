<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财经新闻实时播报</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css?v=12">
</head>
<body>
    <div class="container">
        <header>
            <h1>财经新闻实时播报</h1>
            <div class="header-info">
                <span id="current-time"></span>
                <span class="live-indicator">
                    <span class="live-dot"></span>
                    实时更新
                </span>
            </div>
        </header>

        <main>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在加载新闻...</p>
            </div>

            <div id="news-container" class="news-container"></div>
            <div id="error-message" class="error-message" style="display: none;">
                <p>⚠️ 加载失败，请刷新重试</p>
            </div>

            <div class="pagination-bar" id="pagination">
                <div class="pagination-left">
                    <label>每页 <select id="page-size">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                        <option value="30">30</option>
                        <option value="50">50</option>
                    </select> 条</label>
                    <span id="page-info"></span>
                </div>
                <div class="pagination-right">
                    <button id="first-page" class="page-btn" title="回到第一页">⏮ 首页</button>
                    <button id="prev-page" class="page-btn" disabled>‹ 上一页</button>
                    <button id="next-page" class="page-btn">下一页 ›</button>
                </div>
            </div>

            <div class="export-bar">
                <div class="export-dates">
                    <select id="export-start" title="开始日期"><option value="">最早</option></select>
                    <span>至</span>
                    <select id="export-end" title="结束日期"><option value="">最新</option></select>
                </div>
                <div class="export-buttons">
                    <button class="export-btn" id="btn-json">📥 导出 JSON</button>
                    <button class="export-btn" id="btn-html">📥 导出 HTML</button>
                </div>
            </div>
        </main>

        <footer>
            <p>数据来源：新浪财经 | 财联社 | 东方财富 | 同花顺</p>
        </footer>
    </div>
    <script src="/static/app.js?v=12"></script>
</body>
</html>
