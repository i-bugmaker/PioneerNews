<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>先锋新闻 - 领先的数据控制台</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/style.css?v=29">
</head>
<body>
    <div class="container">
        <header class="vanguard-header">
            <div class="brand-title">
                <img src="/static/favicon.png" class="brand-logomark" alt="Vanguard Logo" />
                <h1 class="metallic-text" data-text="先锋新闻">先锋新闻</h1>
            </div>
            <div class="header-info">
                <span id="current-time"></span>
                <span class="live-indicator">
                    <span class="live-dot"></span>
                    实时更新
                </span>
            </div>
        </header>

        <div class="author-badge" id="author-badge" aria-label="作者信息">
            <span class="badge-label">作者：</span>
            <span class="badge-text">股票批发王哥</span>
        </div>

        <div class="emoji-fly-container" id="emoji-fly-container"></div>

        <div class="search-bar-container">
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <input type="text" id="search-input" placeholder="🔍 搜索新闻关键词..." maxlength="100" autocomplete="off" />
                    <button id="search-clear" class="search-clear" style="display: none;" aria-label="清除搜索"></button>
                </div>
                <button id="search-btn" class="search-btn">搜索</button>
            </div>
        </div>

        <main>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在加载新闻...</p>
            </div>

            <div id="news-container" class="news-container"></div>
            <div id="error-message" class="error-message" style="display: none;">
                <p>⚠️ 加载失败，请刷新重试</p>
            </div>

            <div class="pagination-bar" id="pagination">
                <div class="pagination-left">
                    <label>每页 <select id="page-size">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                        <option value="30">30</option>
                        <option value="50">50</option>
                    </select> 条</label>
                    <span id="page-info"></span>
                </div>
                <div class="pagination-right">
                    <button id="first-page" class="glass-btn" title="回到第一页">⏮ 首页</button>
                    <button id="prev-page" class="glass-btn" disabled>‹ 上一页</button>
                    <button id="next-page" class="glass-btn">下一页 ›</button>
                </div>
            </div>

            <div class="export-bar">
                <div class="export-dates">
                    <select id="export-start" title="开始日期"><option value="">最早</option></select>
                    <span>至</span>
                    <select id="export-end" title="结束日期"><option value="">最新</option></select>
                </div>
                <div class="export-buttons">
                    <button class="glass-btn" id="btn-json">
                        <svg class="export-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                        </svg>
                        <span>导出 JSON</span>
                    </button>
                    <button class="glass-btn" id="btn-html">
                        <svg class="export-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 18 22 12 16 6"/>
                            <polyline points="8 6 2 12 8 18"/>
                        </svg>
                        <span>导出 HTML</span>
                    </button>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/app.js?v=29"></script>
</body>
</html>
