<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="grad3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background subtle glow -->
  <circle cx="50" cy="50" r="45" fill="rgba(139, 92, 246, 0.15)" />
  <!-- Main upward spike -->
  <polygon points="50,15 85,75 50,60" fill="url(#grad1)" opacity="0.9" filter="url(#glow)"/>
  <!-- Left accent spike -->
  <polygon points="50,15 50,60 15,75" fill="url(#grad2)" opacity="0.9"/>
  <!-- Center illuminated prism core -->
  <polygon points="50,30 65,70 50,85 35,70" fill="url(#grad3)" opacity="0.85"/>
</svg>
