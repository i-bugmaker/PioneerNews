name = "poonnernews"
main = "src/entry.py"
compatibility_date = "2026-04-15"
compatibility_flags = ["python_workers"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "pionnernewssql"
database_id = "4e7289ef-4e4b-484c-ae6e-a65821523dd8"  # 部署时替换

[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_NAMESPACE_ID"  # 可选：用于缓存
